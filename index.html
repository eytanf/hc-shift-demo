<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>החונך — הדרכת מוצרים</title>
<style>
  :root{--brown:#6b4423;--cream:#f4f1ea;--gold:#c8923a;--green:#2a8a4a;--red:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI","Assistant",Arial,sans-serif;}
  body{background:linear-gradient(160deg,#f3ecdf,#e6d5bc);min-height:100vh;color:#2b2b2b;}
  header{background:var(--brown);color:#fff;padding:12px 14px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:9;box-shadow:0 2px 12px rgba(0,0,0,.25);}
  .ava{width:52px;height:52px;border-radius:50%;background:var(--gold);display:grid;place-items:center;font-size:28px;overflow:hidden;position:relative;flex-shrink:0;}
  .ava img{width:100%;height:100%;object-fit:cover;}
  .ava.talk::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2.5px solid #fff;animation:pu 1s infinite;}
  @keyframes pu{0%{opacity:.9;transform:scale(1)}100%{opacity:0;transform:scale(1.3)}}
  header b{font-size:16px;} header small{opacity:.85;font-size:11px;display:block;}
  .snd{margin-inline-start:auto;background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:9px;padding:8px 11px;cursor:pointer;font-size:16px;}
  .bubble{background:#fff;border-radius:14px;margin:12px;padding:12px 14px;font-size:14.5px;line-height:1.5;box-shadow:0 3px 14px rgba(80,50,20,.12);border-inline-start:4px solid var(--gold);}
  .wrap{max-width:760px;margin:0 auto;padding:0 12px 40px;}
  .search{display:flex;gap:8px;margin:4px 0 10px;}
  .search input{flex:1;padding:12px;border:1.5px solid #d8c9ae;border-radius:12px;font-size:15px;background:#fff;}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch;}
  .chip{flex-shrink:0;background:#fff;border:1.5px solid #d8c9ae;color:var(--brown);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;}
  .chip.on{background:var(--brown);color:#fff;border-color:var(--brown);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(80,50,20,.1);cursor:pointer;transition:.15s;}
  .card:active{transform:scale(.97);}
  .card img{width:100%;height:110px;object-fit:cover;display:block;background:#eee;}
  .card .noimg{width:100%;height:110px;display:grid;place-items:center;font-size:38px;background:#f3ecdf;}
  .card .nm{padding:8px 9px 4px;font-size:13px;font-weight:700;line-height:1.3;min-height:38px;}
  .card .meta{display:flex;gap:5px;padding:0 9px 9px;flex-wrap:wrap;}
  .pill{font-size:10.5px;font-weight:800;border-radius:7px;padding:2px 7px;background:var(--brown);color:#fff;}
  .k{font-size:10.5px;font-weight:700;border-radius:7px;padding:2px 7px;}
  .k.p{background:#e7f3e9;color:var(--green);} .k.d{background:#eaf0fb;color:#2a5ca8;}
  /* product page */
  .pv{position:fixed;inset:0;background:var(--cream);z-index:20;overflow:auto;display:none;}
  .pv.open{display:block;}
  .pv .hero{position:relative;}
  .pv .hero img{width:100%;max-height:280px;object-fit:cover;display:block;}
  .pv .back{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:15px;cursor:pointer;}
  .pv .body{max-width:700px;margin:0 auto;padding:14px;}
  .pv h1{color:var(--brown);font-size:21px;margin-bottom:8px;}
  .facts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
  .fact{background:#fff;border:1px solid #e5d7bd;border-radius:10px;padding:6px 11px;font-size:12.5px;}
  .fact b{color:var(--brown);}
  .stepbox{background:#fff;border-radius:16px;padding:20px 16px;text-align:center;box-shadow:0 4px 16px rgba(80,50,20,.12);}
  .stepbox .n{display:inline-block;min-width:38px;height:38px;line-height:38px;border-radius:50%;background:var(--gold);color:#fff;font-weight:800;font-size:17px;}
  .stepbox .tx{font-size:18px;font-weight:700;line-height:1.5;margin:13px 0;}
  .pbar{height:7px;background:#e7dcc9;border-radius:5px;margin:10px 0;overflow:hidden;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--green));transition:.3s;}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:13px;background:var(--brown);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:10px;}
  .btn.ghost{background:#fff;color:var(--brown);border:2px solid var(--brown);}
  .rowbtns{display:flex;gap:8px;} .rowbtns .btn{flex:1;}
  .done{background:#e7f6ec;color:var(--green);border:1.5px solid #abdcb9;border-radius:13px;padding:14px;text-align:center;font-weight:800;margin-top:10px;}
  .note{text-align:center;color:#8a7a64;font-size:11.5px;padding:10px;}
</style>
</head>
<body>
<header>
  <span class="ava" id="ava">👨‍🍳</span>
  <div><b>החונך · קובי</b><small>הדרכת מוצרים · מהחוברת הרשמית</small></div>
  <button class="snd" id="snd" onclick="tgl()">🔊</button>
</header>

<div class="bubble" id="say">שלום! אני החונך. בחר מוצר — ואני אסביר לך צעד-צעד איך מכינים אותו, בדיוק לפי נהלי האפייה.</div>

<div class="wrap">
  <div class="search"><input id="q" placeholder="🔍 חפש מוצר... (בגט, חלה, בורקס...)" oninput="render()"></div>
  <div class="chips" id="chips"></div>
  <div class="grid" id="grid"></div>
  <p class="note">116 מוצרים · הופק אוטומטית מחוברות נהלי האפייה · דמו</p>
</div>

<div class="pv" id="pv">
  <div class="hero"><img id="pimg" src="" alt=""><button class="back" onclick="closeP()">→ חזרה</button></div>
  <div class="body">
    <h1 id="pname"></h1>
    <div class="facts" id="pfacts"></div>
    <div class="pbar"><i id="pbar"></i></div>
    <div class="stepbox">
      <span class="n" id="sn">1</span>
      <div class="tx" id="stx"></div>
      <div class="rowbtns">
        <button class="btn ghost" id="prevb" onclick="prv()">→ הקודם</button>
        <button class="btn" id="nextb" onclick="nxt()">בוצע ✓ הבא</button>
      </div>
      <button class="btn ghost" onclick="rpt()">🔊 חזור על ההסבר</button>
    </div>
    <div id="pdone"></div>
  </div>
</div>

<script src="products.js"></script>
<script>
let snd=true,cat="הכל",cur=null,si=0,heVoice=null,warned=false;
const CATS=["הכל",...new Set(window.PRODUCTS.map(p=>p.cat))];
function pickVoice(){const vs=speechSynthesis.getVoices()||[];
 heVoice=vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith('he'))||
         vs.find(v=>/hebrew|עברית|ivrit|carmit/i.test(v.name))||null;}
if(window.speechSynthesis){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function speak(t){if(!snd||!window.speechSynthesis)return;speechSynthesis.cancel();
 if(!heVoice)pickVoice();
 const u=new SpeechSynthesisUtterance(t);u.lang='he-IL';u.rate=1.0;
 if(heVoice)u.voice=heVoice;
 else if(!warned){warned=true;document.getElementById('say').innerHTML=
  '💡 כדי שאדבר <b>בעברית</b>: בהגדרות הטלפון → ניהול כללי → טקסט לדיבור (TTS) → התקן/בחר שפה עברית (Google TTS). בינתיים אמשיך בכתב.';return;}
 const a=document.getElementById('ava');a.classList.add('talk');u.onend=()=>a.classList.remove('talk');
 speechSynthesis.speak(u);}
function tgl(){snd=!snd;document.getElementById('snd').textContent=snd?'🔊':'🔇';if(!snd)speechSynthesis.cancel();}
function chips(){const el=document.getElementById('chips');el.innerHTML='';
 CATS.forEach(c=>{const b=document.createElement('button');b.className='chip'+(c===cat?' on':'');b.textContent=c;
  b.onclick=()=>{cat=c;render();};el.appendChild(b);});}
function render(){chips();const q=document.getElementById('q').value.trim();
 const el=document.getElementById('grid');el.innerHTML='';
 window.PRODUCTS.filter(p=>(cat==='הכל'||p.cat===cat)&&(!q||p.name.includes(q))).forEach(p=>{
  const d=document.createElement('div');d.className='card';d.onclick=()=>openP(p);
  d.innerHTML=(p.img?`<img loading="lazy" src="img/${p.img}">`:`<div class="noimg">🥐</div>`)+
   `<div class="nm">${p.name}</div><div class="meta">${p.prog?`<span class="pill">${p.prog}</span>`:''}`+
   (p.kosher?`<span class="k ${p.kosher==='פרווה'?'p':'d'}">${p.kosher}</span>`:'')+`</div>`;
  el.appendChild(d);});}
function openP(p){cur=p;si=0;
 document.getElementById('pimg').src=p.img?('img/'+p.img):'';
 document.getElementById('pname').textContent=p.name;
 const f=[];if(p.kosher)f.push(`<b>כשרות:</b> ${p.kosher}`);if(p.prog)f.push(`<b>תוכנית:</b> ${p.prog}`);
 if(p.days)f.push(`<b>ימי אפייה:</b> ${p.days}`);if(p.hours)f.push(`<b>שעות:</b> ${p.hours}`);
 if(p.barcode)f.push(`<b>ברקוד:</b> ${p.barcode}`);if(p.shelf)f.push(`<b>חיי מדף:</b> ${p.shelf}`);
 document.getElementById('pfacts').innerHTML=f.map(x=>`<span class="fact">${x}</span>`).join('');
 document.getElementById('pdone').innerHTML='';
 document.getElementById('pv').classList.add('open');window.scrollTo(0,0);
 speak(`${p.name}. ${p.kosher||''}. ${p.prog?'תוכנית '+p.prog+'.':''} בוא נעבור על השלבים.`);
 setTimeout(step,1800);}
function step(){const s=cur.steps[si];
 document.getElementById('sn').textContent=si+1;
 document.getElementById('stx').textContent=s;
 document.getElementById('pbar').style.width=(si/cur.steps.length*100)+'%';
 document.getElementById('prevb').style.visibility=si?'visible':'hidden';
 document.getElementById('nextb').textContent=si<cur.steps.length-1?'בוצע ✓ הבא':'סיימתי ✓';
 speak(s);}
function nxt(){if(si<cur.steps.length-1){si++;step();}
 else{document.getElementById('pbar').style.width='100%';
  document.getElementById('pdone').innerHTML='<div class="done">✅ כל הכבוד! סיימת את '+cur.name+' לפי הנוהל.</div>';
  speak('כל הכבוד! סיימת את '+cur.name+' בדיוק לפי הנוהל.');}}
function prv(){if(si>0){si--;step();}}
function rpt(){step();}
function closeP(){document.getElementById('pv').classList.remove('open');speechSynthesis.cancel();}
render();
</script>
</body>
</html>
